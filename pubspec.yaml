name: utopia_scoreboard
description: "A cross-platform scoreboard for Mahjong, Card Game or Table Game."
publish_to: 'none'
version: 0.0.2

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  uuid: ^4.2.2
  wakelock_plus: ^1.4.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  package_info_plus: ^9.0.0
  intl: ^0.19.0
  file_picker: ^8.0.0
  share_plus: ^12.0.1
  gal: ^2.3.2
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android:
    generate: false
  ios: true
  image_path: "assets/images/ic_ios.png"
  windows:
    generate: true
    image_path: "assets/images/ic_windows.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/ic_macos.png"